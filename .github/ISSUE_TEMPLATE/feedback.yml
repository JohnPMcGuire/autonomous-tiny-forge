name: Tiny Forge feedback
description: Suggest an improvement, report a problem, or propose a need worth solving.
title: "[Feedback] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping the forge improve. Feedback is reviewed as an untrusted suggestion and will never be executed as code.
  - type: dropdown
    id: kind
    attributes:
      label: Feedback type
      options:
        - Something is broken
        - An app is confusing
        - Improvement idea
        - New need worth solving
        - Accessibility issue
        - Something else
    validations:
      required: true
  - type: input
    id: app
    attributes:
      label: App name
      description: Leave blank for general feedback.
      placeholder: Time Sense
  - type: textarea
    id: details
    attributes:
      label: What happened or what would help?
      description: Describe the need or experience. Please do not include passwords, API keys, or private information.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What would a better result feel like?
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include passwords, API keys, or sensitive personal information.
          required: true
