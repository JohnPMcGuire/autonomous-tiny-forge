name: Autonomous forge run

on:
  schedule:
    - cron: '17 15 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  create-or-improve:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Let the forge choose one bounded change
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/forge.mjs
      - name: Validate generated result
        run: node --check app.js && node --check scripts/forge.mjs && node scripts/validate.mjs
      - name: Commit accepted change
        run: |
          if git diff --quiet; then
            echo "No publishable change this run."
          else
            git config user.name "tiny-forge-bot"
            git config user.email "tiny-forge-bot@users.noreply.github.com"
            git add registry/apps.json
            git commit -m "forge: autonomous collection update"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy current collection
        id: deployment
        uses: actions/deploy-pages@v4
