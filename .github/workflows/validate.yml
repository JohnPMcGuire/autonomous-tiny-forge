name: Validate forge

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: node --check app.js && node --check time-sense.js && node --check gallery-preview.js && node --check pairadox.js && node --check fair-choice.js && node --check tiny-step.js && node --check constraint-spark.js && node --check scripts/forge.mjs && node --check scripts/validate.mjs && node --check tests/feedback-routing.test.mjs
      - name: Test feedback routing
        run: node tests/feedback-routing.test.mjs
      - name: Validate registry and safety rules
        run: node scripts/validate.mjs
